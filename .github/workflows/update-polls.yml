name: Update Poll Data

on:
  schedule:
    # Täglich um 6:00 Uhr UTC (8:00 Uhr deutscher Zeit im Sommer)
    - cron: '0 6 * * *'
  # Ermöglicht manuelles Auslösen über GitHub UI
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch poll data from dawum.de
        run: |
          curl -s https://api.dawum.de/newest_surveys.json -o data/polls.json
          echo "Fetched $(wc -c < data/polls.json) bytes"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/polls.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/polls.json
          git commit -m "Update poll data $(date -u +%Y-%m-%d)"
          git push
